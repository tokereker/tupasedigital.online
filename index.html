<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Estás Invitado! Boda de Jose Carlos & Vanessa</title>

    <meta property="og:title" content="¡Invitación al Cumpleaños de [Nombre]!">
    <meta property="og:description" content="Acompáñanos a celebrar este [Día] a las [Hora]. ¡No faltes!">
    <meta property="og:image" content="https://www.tusitio.com/ruta-a-tu-imagen.jpg">
    <meta property="og:url" content="https://www.tusitio.com/tu-invitacion.html">
    <meta property="og:type" content="website">

    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/jpeg">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .tarjeta-invitacion {
            background: white;
            max-width: 450px; /* Ancho máximo ideal para celulares */
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            overflow: hidden;
            padding-bottom: 25px;
        }
        
        /* AQUÍ SE FORCEJEA EL TAMAÑO DE LA IMAGEN SIN DEFORMARLA */
        .imagen-forzada {
            width: 100%;         /* Ocupa todo el ancho disponible */
            height: 350px;       /* Forzamos una altura fija sin importar la original */
            
            /* propiedad mágica: recorta y adapta la foto automáticamente al contenedor 
               como si fuera un marco, sin estirarla ni aplastarla */
            object-fit: cover;   
            
            object-position: center; /* Centra el enfoque de la foto */
        }

        .contenido {
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="tarjeta-invitacion">
        <img src="https://www.tusitio.com/ruta-a-tu-imagen.jpg" alt="Invitación" class="imagen-forzada">
        
        <div class="contenido">
            <h1>¡Te invito a mi fiesta!</h1>
            <p>Acompáñame a celebrar un año más de vida.</p>
            <p><strong>Fecha:</strong> [Día de la fiesta]<br><strong>Hora:</strong> [Hora]</p>
        </div>
    </div>

</body>
</html>
